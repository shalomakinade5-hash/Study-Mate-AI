<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Study Mate AI</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
    <style>
        /* GENERAL STYLES */
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    background:#020617;
}

.nav-links a{
    margin-left:20px;
    text-decoration:none;
    color:white;
}

.home-btn{
    background:#b7ff2a;
    color:black;
    padding:8px 18px;
    border-radius:6px;
    font-weight:bold;
}

/* HERO SECTION */
.hero{
    text-align:center;
    padding:120px 20px;
    position:relative;
    overflow:hidden;
}

.hero::before{
    content:"";
    position:absolute;
    top:-200px;
    left:50%;
    transform:translateX(-50%);
    width:600px;
    height:600px;
    background:radial-gradient(circle, rgba(183,255,42,0.25), transparent 70%);
    filter:blur(80px);
    z-index:-1;
}

.hero h2{
    font-size:48px;
    font-weight:bold;
    color:#b7ff2a;
}

.hero p{
    max-width:500px;
    margin:auto;
    margin-top:20px;
    margin-bottom:30px;
}

.start-btn{
    background:#b7ff2a;
    color:black;
    padding:15px 30px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* FEATURES SECTION */
.features{
    padding:80px 20px;
    text-align:center;
}

.feature-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:30px;
    margin-top:40px;
    padding:0 60px;
}

.feature-card{
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    transition:0.3s;
    cursor:pointer;
}

.feature-card:hover{
    transform:translateY(-8px);
    box-shadow:0 10px 20px rgba(0,0,0,0.4);
    border:1px solid #b7ff2a;
}

/* COINS & REWARDS SECTION */
.rewards{
    background:#0f172a;
    padding:60px 20px;
    text-align:center;
}

.rewards h2{
    color:#b7ff2a;
    font-size:36px;
    margin-bottom:20px;
}

.reward-cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    max-width:700px;
    margin:auto;
}

.reward-card{
    background:#1e293b;
    padding:25px;
    border-radius:12px;
    transition:0.3s;
    cursor:pointer;
}

.reward-card:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 16px rgba(0,0,0,0.3);
    border:1px solid #b7ff2a;
}

.reward-card h3{
    color:#b7ff2a;
    margin-bottom:10px;
}

.reward-card p{
    color:#d1d5db;
    font-size:14px;
}

/* AUTH (LOGIN & REGISTER) */
.auth-section{
    text-align:center;
    padding:80px 20px;
}

.auth-box{
    max-width:400px;
    margin:auto;
    background:#1e293b;
    padding:40px;
    border-radius:12px;
}

.auth-box input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border:none;
    border-radius:6px;
}

.auth-box button{
    width:100%;
    padding:15px;
    background:#b7ff2a;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.auth-box a{
    color:#b7ff2a;
    text-decoration:none;
}

.auth-box a:hover{
    text-decoration:underline;
}

/* AI DEMO */
.ai-demo{
    text-align:center;
    padding:80px 20px;
}

.ai-box{
    max-width:600px;
    margin:auto;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
}

.ai-box input{
    width:65%;
    padding:12px;
    border:none;
    border-radius:6px;
    margin-right:10px;
}

.ai-box button{
    padding:12px 20px;
    background:#b7ff2a;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

#ai-response{
    margin-top:20px;
    background:#020617;
    padding:15px;
    border-radius:8px;
    min-height:40px;
}

/* PDF UPLOAD BOX WITH HERO GLOW */
.pdf-box{
    width:100%;
    max-width:400px;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    display:flex;
    justify-content: center;
    flex-direction: column;
    align-items: center;
    gap:15px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(183,255,42,0.2);
}

.pdf-box::before{
    content:"";
    position:absolute;
    top:-50%;
    left:50%;
    transform:translateX(-50%);
    width:300px;
    height:300px;
    background: radial-gradient(circle, rgba(183,255,42,0.25), transparent 70%);
    filter: blur(80px);
    z-index:-1;
    transition: all 0.3s ease-in-out;
}

.pdf-box:hover::before{
    filter: blur(100px);
    transform: translateX(-50%) scale(1.1);
}

.pdf-box input[type="file"]{
    width:100%;
    padding:10px;
    border-radius:6px;
    background:#0f172a;
    color:white;
    border:none;
}

.pdf-box button{
    width:100%;
    padding:12px;
    background:#b7ff2a;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    transition: 0.3s;
}

.pdf-box button:hover{
    background:#a6e22d;
}

#pdf-response{
    margin-top:20px;
    background:#020617;
    padding:15px;
    border-radius:8px;
    min-height:50px;
    color:#d1d5db;
    width:100%;
    max-width:400px;
    text-align:left;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:30px;
    background:#020617;
    margin-top:80px;
    color:#94a3b8;
    font-size:14px;
}
    </style>

<!-- NAVBAR -->
<nav class="navbar">
<h1 class="logo">Study Mate AI</h1>
<div class="nav-links">
<a href="index.html">Home</a>
<a href="login.html">Login</a>
</div>
</nav>

<!-- REGISTER FORM -->
<section class="auth-section">
<h2>Create Account</h2>
<div class="auth-box">
<form id="registerForm">
<input type="text" id="fullName" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="registerUser()">Register</button>

<script>
function registerUser() {
    const name = document.getElementById("fullName").value;
    if(!name) {
        alert("Please enter your name!");
        return;
    }
    // Save name to localStorage
    localStorage.setItem("studentName", name);
    alert("Registration successful!");
    window.location.href = "dashboard.html";
}
</script>
</form>
<p>Already have an account? <a href="login.html">Login here</a></p>
</div>
</section>

<script>
// Simple registration handler (demo)
document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();
    alert("Account created! Redirecting to dashboard...");
    // In real app: save user and redirect
    window.location.href = "dashboard.html";
});
</script>

</body>
</html>
